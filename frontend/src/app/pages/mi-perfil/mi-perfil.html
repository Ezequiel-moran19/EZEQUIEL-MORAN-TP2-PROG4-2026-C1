<div class="container">

  <div class="rounded-4 shadow overflow-hidden">
    <div class="bg-primary" style="height: 200px; background: var(--nexo-gradient);"></div>
  </div>

  <div class="card border-0 shadow mt-n5">
    <div class="card-body">
      <div class="row align-items-center">
        <div class="col-md-auto text-center">
          <img [src]="usuario?.imagenPerfil" class="rounded-circle border border-5 border-white shadow" width="160" height="160">
        </div>
        <div class="col">
          <h2 class="fw-bold mb-1"> {{ usuario?.nombre }} </h2>
          <p class="text-muted mb-2"> {{ usuario?.email }} </p>
        </div>
        <div class="col-md-auto mt-3 mt-md-0">
          <button class="btn btn-primary"> Editar perfil  </button>
        </div>
      </div>
    </div>
  </div>

  <div class="row mt-4">

    <div class="col-lg-4">
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <h5 class="fw-bold mb-3"> Información </h5>
          <p class="mb-3"> 📧 {{ usuario?.email }} </p>
          <p class="mb-3"> 🎂 {{ usuario?.fechaNacimiento | date:'dd/MM/yyyy' }}</p>
          <p class="mb-0">👤 {{ usuario?.nombre }} {{ usuario?.apellido }}</p>
        </div>
      </div>
    </div>
    
    <div class="col-lg-8">
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <h4 class="fw-bold mb-3"> Publicaciones </h4>
          <div class="alert alert-light border"> Todavía no hay publicaciones. </div>
        </div>
      </div>
    </div>

  </div>

</div>
