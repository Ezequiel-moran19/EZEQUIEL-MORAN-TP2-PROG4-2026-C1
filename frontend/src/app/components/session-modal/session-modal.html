@if(session.mostrarModal()){

<div class="modal-backdrop-custom">

  <div class="card shadow-lg border-0 p-4 text-center modal-box">

    <div class="fs-1 mb-2">
      ⏳
    </div>

    <h4 class="fw-bold text-dark">
      Sesión por vencer
    </h4>

    <p class="text-muted">
      Tu sesión está por finalizar.<br>
      ¿Querés continuar conectado?
    </p>

    <div class="d-flex justify-content-center gap-3">

      <button 
        class="btn btn-primary"
        (click)="session.extenderSesion()">
        Continuar sesión
      </button>

      <button 
        class="btn btn-outline-danger"
        (click)="session.cancelarSesion()">
        Cerrar sesión
      </button>

    </div>

  </div>

</div>

}
