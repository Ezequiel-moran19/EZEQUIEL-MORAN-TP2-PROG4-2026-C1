<form [formGroup]="form" (ngSubmit)="crearPublicacion()" class="p-4 border rounded">
    <h4 class="mb-3">
        <i class="bi bi-plus-circle me-2"></i>
        Nueva Publicación
    </h4>

    <div class="mb-3">
        <label for="descripcion" class="form-label">
            <i class="bi bi-card-text me-1"></i>
            Descripción
        </label>
        <textarea class="form-control" formControlName="descripcion"></textarea>
    </div>

    <div class="mb-3">
        <label for="imagen" class="form-label">
            <i class="bi bi-image me-1"></i>
            URL de la Imagen
        </label>
        <input type="file" class="form-control" (change)="seleccionarArchivo($event)">
        <div class="form-text text-white">Selecciona una imagen</div>
    </div>

    <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-send me-2"></i>
        Publicar
    </button>
</form>
